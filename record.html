<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>기록하기 | 간헐적은퇴 연구소</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="archive-app.css" />
</head>
<body>
  <main class="archive-app record-page">
    <nav class="nav" aria-label="기록 메뉴">
      <a class="brand" href="index.html">간헐적은퇴 <span>연구소</span></a>
      <a class="back-link" href="gallery.html">공개 기록 보기</a>
    </nav>
    <section class="record-wrap">
      <div class="record-intro"><p class="section-label">PRIVATE STUDIO</p><h1>오늘의<br /><em>기록하기</em></h1><p>그림 한 장과 그날의 생각을 남겨두세요.<br />공개를 선택한 기록만 갤러리에 보입니다.</p></div>
      <section id="auth-panel" class="record-card">
        <h2>로그인</h2>
        <p>원장님만 기록을 올릴 수 있는 개인 공간입니다.</p>
        <form id="login-form"><label>이메일<input name="email" type="email" autocomplete="email" required /></label><label>비밀번호<input name="password" type="password" autocomplete="current-password" required /></label><button class="button" type="submit">로그인 <span>→</span></button></form>
        <button id="signup-button" class="text-button" type="button">처음이라면 계정 만들기</button>
        <p id="auth-message" class="form-message"></p>
      </section>
      <section id="editor-panel" class="record-card" hidden>
        <div class="editor-head"><div><h2>새 기록</h2><p id="signed-in-email"></p></div><button id="signout-button" class="text-button" type="button">로그아웃</button></div>
        <form id="post-form"><label>제목<input name="title" maxlength="100" required placeholder="기록의 제목" /></label><div class="form-row"><label>분류<select name="category"><option>그리기</option><option>읽기</option><option>쓰기</option><option>생명에 관한 기록</option><option>간헐적은퇴의 일상</option></select></label><label>날짜<input name="eventDate" type="date" required /></label></div><label>그림 또는 사진<input name="image" type="file" accept="image/*" /></label><label>글<textarea name="body" rows="10" placeholder="그림과 함께 남기고 싶은 이야기를 적어주세요."></textarea></label><label class="check-label"><input name="published" type="checkbox" checked /> 이 기록을 공개 갤러리에 전시합니다.</label><button class="button" type="submit">기록 저장하기 <span>→</span></button></form>
        <p id="post-message" class="form-message"></p>
      </section>
    </section>
  </main>
  <script type="module" src="record.js"></script>
</body>
</html>
